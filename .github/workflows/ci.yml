name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cybercafe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r local_server/requirements.txt
          pip install pytest pytest-cov
      
      - name: Install Prisma
        run: |
          pip install prisma
          prisma generate
      
      - name: Setup database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cybercafe_test
        run: |
          prisma db push
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cybercafe_test
          SECRET_KEY: test-secret-key
        run: |
          pytest tests/ -v --cov=local_server --cov=global_server --cov=shared
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          pip install flake8 black isort
      
      - name: Run flake8
        run: |
          flake8 local_server/ global_server/ shared/ --max-line-length=120
      
      - name: Check formatting with black
        run: |
          black --check local_server/ global_server/ shared/
      
      - name: Check imports with isort
        run: |
          isort --check-only local_server/ global_server/ shared/

  build-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: dashboard/frontend
        run: npm ci
      
      - name: Build
        working-directory: dashboard/frontend
        run: npm run build
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: dashboard-dist
          path: dashboard/frontend/dist

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build local server
        run: |
          docker build -t cybercafe-local-server:latest -f deploy/docker/local_server/Dockerfile .
      
      - name: Build global server
        run: |
          docker build -t cybercafe-global-server:latest -f deploy/docker/global_server/Dockerfile .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, lint, docker-build]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: |
          echo "Deploy to staging server..."
          # Add your deployment commands here

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, lint, docker-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "Deploy to production server..."
          # Add your deployment commands here
